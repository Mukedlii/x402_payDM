<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PayDM – write a DM</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="card">
      <div class="badge success">✓ Payment successful</div>
      <h1>Write your message</h1>
      <p class="lead">
        We received your 0.20 USDC. Go ahead and write — I'll read it.
      </p>

      <form id="dm-form" class="form">
        <label>
          <span>Your name / handle</span>
          <input
            name="name"
            type="text"
            required
            placeholder="e.g. @satoshi"
            maxlength="100"
          />
        </label>

        <label>
          <span>Message</span>
          <textarea
            name="message"
            required
            placeholder="What would you like to say?"
            rows="6"
            maxlength="2000"
          ></textarea>
        </label>

        <button type="submit" class="cta">Send →</button>
      </form>

      <div id="result" class="result hidden"></div>

      <p class="foot"><a href="/">← back to home</a></p>
    </main>

    <script>
      const form = document.getElementById("dm-form");
      const result = document.getElementById("result");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(form));

        try {
          const r = await fetch("/dm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          const json = await r.json();

          if (r.ok) {
            form.classList.add("hidden");
            result.classList.remove("hidden");
            result.classList.add("ok");
            result.textContent = "✓ " + (json.message || "Thanks!");
          } else {
            result.classList.remove("hidden");
            result.classList.add("err");
            result.textContent = json.error || "Something went wrong";
          }
        } catch (err) {
          result.classList.remove("hidden");
          result.classList.add("err");
          result.textContent = "Network error: " + err.message;
        }
      });
    </script>
  </body>
</html>
