<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PayDM – Inbox</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="card wide">
      <div class="badge">📬 Inbox</div>
      <h1>Incoming DMs</h1>
      <p class="lead">
        Every message was paid for with 0.20 USDC.
        <button id="refresh" class="link">↻ refresh</button>
      </p>

      <div id="list" class="list">
        <p class="muted">Loading…</p>
      </div>

      <p class="foot"><a href="/">← home</a></p>
    </main>

    <script>
      const list = document.getElementById("list");

      async function load() {
        list.innerHTML = '<p class="muted">Loading…</p>';
        try {
          const r = await fetch("/api/messages");
          const items = await r.json();

          if (!items.length) {
            list.innerHTML =
              '<p class="muted">No messages yet. Be the first!</p>';
            return;
          }

          list.innerHTML = items
            .map((m) => {
              const t = new Date(m.timestamp).toLocaleString("en-US");
              return `
                <article class="msg">
                  <header>
                    <strong>${escapeHtml(m.name)}</strong>
                    <span class="time">${t}</span>
                  </header>
                  <p>${escapeHtml(m.message)}</p>
                  <footer><span class="paid">✓ paid 0.20 USDC</span></footer>
                </article>
              `;
            })
            .join("");
        } catch (err) {
          list.innerHTML =
            '<p class="muted">Error loading: ' + err.message + "</p>";
        }
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      document.getElementById("refresh").addEventListener("click", load);
      load();
    </script>
  </body>
</html>
